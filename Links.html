<style>
:root{
  --blue:#0A6EFF;
  --bg:#020810;
  --card:rgba(4,12,24,.85);
  --text:#fff;
  --muted:#b0c8e8;
  --glow:0 0 15px rgba(10,110,255,.6);
}

*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:Inter,sans-serif;
  background:radial-gradient(circle at top,#061428,#020810);
  color:var(--text);
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  padding:20px;
}

/* container */
.container{
  width:100%;
  max-width:420px;
  text-align:center;
}

/* profile */
.profile{
  margin-bottom:25px;
}

.profile h1{
  font-size:2rem;
  font-weight:800;
  color:var(--blue);
  text-shadow:var(--glow);
}

.profile p{
  font-size:.9rem;
  color:var(--muted);
  margin-top:5px;
}

/* buttons */
.links{
  display:flex;
  flex-direction:column;
  gap:14px;
  margin-top:20px;
}

.link-btn{
  display:flex;
  justify-content:center;
  align-items:center;
  padding:14px;
  background:var(--card);
  border:1px solid rgba(10,110,255,.3);
  color:white;
  text-decoration:none;
  border-radius:10px;
  font-weight:600;
  letter-spacing:.5px;
  transition:.25s;
  box-shadow:0 0 0 rgba(0,0,0,0);
}

.link-btn:hover{
  transform:translateY(-3px);
  border-color:var(--blue);
  box-shadow:var(--glow);
}

/* section titles */
.section{
  margin-top:25px;
  font-size:.75rem;
  color:var(--blue);
  letter-spacing:.2em;
  text-transform:uppercase;
}

/* footer */
footer{
  margin-top:30px;
  font-size:.7rem;
  color:#6f88aa;
}
</style>
</head>

<body>
